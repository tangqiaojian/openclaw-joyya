# Spring Boot H2 In-Memory Database Configuration

spring:
  datasource:
    url: jdbc:h2:mem:joyya;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.joyya: DEBUG
    org.springframework.web: DEBUG
