spring:
  application:
    name: joyya-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/joyya?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: joyya-secret-key-for-jwt-token-generation
  expiration: 86400000

server:
  port: 8080
